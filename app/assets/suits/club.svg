<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="club">
  <!--
    Club: three circles (as bezier paths) + stem + wings.

    Circle approximation: a circle of radius r centered at (cx,cy)
    uses 4 cubic bezier segments. The magic constant k = 0.5523.
    So for each circle, the 4 arcs are:
      Top → Right → Bottom → Left → Top
    with control point offset = r * 0.5523.

    Three circle centers and radius r=20:
      Top-center: (50, 28)
      Lower-left: (32, 52)
      Lower-right: (68, 52)

    Stem: (44,65)→(44,80)→(56,80)→(56,65), closed.
    Wings: from (56,80) out to (74,92) curve to (50,95) curve to (26,92) to (44,80).

    All three circles are separate M…Z subpaths.
    Stem+wings is one M…Z subpath.
    fill-rule="nonzero" so all subpaths fill solid.
  -->
  <path fill="currentColor" fill-rule="nonzero" d="
    M 50,8
    C 61.05,8 70,16.95 70,28
    C 70,39.05 61.05,48 50,48
    C 38.95,48 30,39.05 30,28
    C 30,16.95 38.95,8 50,8
    Z

    M 32,32
    C 43.05,32 52,40.95 52,52
    C 52,63.05 43.05,72 32,72
    C 20.95,72 12,63.05 12,52
    C 12,40.95 20.95,32 32,32
    Z

    M 68,32
    C 79.05,32 88,40.95 88,52
    C 88,63.05 79.05,72 68,72
    C 56.95,72 48,63.05 48,52
    C 48,40.95 56.95,32 68,32
    Z

    M 44,65
    L 44,80
    C 30,84 18,90 18,92
    C 26,95 38,95 50,95
    C 62,95 74,95 82,92
    C 82,90 70,84 56,80
    L 56,65
    Z
  "/>
</svg>
