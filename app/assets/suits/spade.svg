<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="spade">
  <!--
    Spade: three subpaths in one <path> using fill-rule evenodd.

    Subpath 1 — BLADE (inverted heart):
      Apex at (50,8). Right arc swings out to (88,52) then back to center
      bottom (50,70). Left arc mirrors. Control points ride far out to give
      the blade its full, rounded shoulders.

    Subpath 2 — STEM + BASE WINGS (solid fill):
      Stem column (44,70)→(44,82)→(56,82)→(56,70).
      Base wings: from (56,82) bezier out-right to (75,92) then curve to
      bottom-center (50,95), mirror left side back to (44,82).
      Drawn as one continuous closed subpath so the stem and wings are one shape.
  -->
  <path fill="currentColor" fill-rule="nonzero" d="
    M 50,8
    C 28,22 8,40 8,56
    C 8,70 20,76 32,70
    C 26,78 18,82 10,82
    C 18,90 30,90 44,86
    L 44,70
    C 30,75 16,68 16,56
    C 16,42 38,26 50,14
    C 62,26 84,42 84,56
    C 84,68 70,75 56,70
    L 56,86
    C 70,90 82,90 90,82
    C 82,82 74,78 68,70
    C 80,76 92,70 92,56
    C 92,40 72,22 50,8
    Z
  "/>
</svg>
